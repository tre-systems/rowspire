name: Deploy to Cloudflare

on:
  push:
    branches:
      - main

  workflow_dispatch:
jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy to Cloudflare
    permissions:
      contents: read
      deployments: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install Rust tools
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'v0.15.0'

      - name: Install Wrangler
        run: npm install -g wrangler@4.110.0

      - name: Verify Wrangler installation
        run: |
          echo "Wrangler version:"
          wrangler --version
          echo "Wrangler installation verified"

      - name: Cache Rust dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/bin/
            ~/.cargo/registry/index/
            ~/.cargo/registry/cache/
            ~/.cargo/git/db/
            worker/target/
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}-${{ hashFiles('.github/workflows/deploy.yml') }}

      - name: Cache node modules
        uses: actions/cache@v4
        with:
          path: ~/.npm
          key: ${{ runner.os }}-npm-${{ hashFiles('**/package-lock.json') }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Cache Playwright browsers
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: ${{ runner.os }}-playwright-${{ hashFiles('**/package-lock.json') }}

      - name: Install Playwright browsers
        run: npx playwright install --with-deps

      - name: Build wasm assets
        run: npm run build:wasm-assets

      - name: Run all tests
        run: npm run check

      - name: Audit branding after tests
        run: npm run brand:audit

      - name: Build static site
        run: npm run build
        env:
          GITHUB_SHA: ${{ github.sha }}
          NEXT_PUBLIC_SENTRY_DSN: ${{ vars.NEXT_PUBLIC_SENTRY_DSN }}
          NEXT_PUBLIC_SENTRY_ENVIRONMENT: production
          NEXT_PUBLIC_SENTRY_RELEASE: ${{ github.sha }}
          SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}
          SENTRY_ENVIRONMENT: production
          SENTRY_ORG: ${{ vars.SENTRY_ORG || 'total-reality-engineering' }}
          SENTRY_PROJECT: ${{ vars.SENTRY_PROJECT || 'rowspire' }}
          SENTRY_RELEASE: ${{ github.sha }}

      - name: Audit branding after build
        run: npm run brand:audit

      - name: Deploy Frontend
        run: wrangler deploy --config wrangler.toml --env=""
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
