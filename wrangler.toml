name = "rowspire-main"
main = "src/worker.ts"
compatibility_date = "2025-06-14"

[assets]
directory = "./out"
binding = "ASSETS"
run_worker_first = true

[[routes]]
pattern = "rowspire.tre.systems"
custom_domain = true

[[routes]]
pattern = "rowspire.com"
custom_domain = true

[[routes]]
pattern = "www.rowspire.com"
custom_domain = true

[[routes]]
pattern = "rowspire.net"
custom_domain = true

[[routes]]
pattern = "www.rowspire.net"
custom_domain = true

[[routes]]
pattern = "rowspire.org"
custom_domain = true

[[routes]]
pattern = "www.rowspire.org"
custom_domain = true

[[routes]]
pattern = "connect-4.tre.systems"
custom_domain = true
