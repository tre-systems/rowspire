<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" role="img" aria-labelledby="title desc">
  <title id="title">Rowspire icon</title>
  <desc id="desc">A dark rounded game grid with teal and violet counters forming a rising row.</desc>
  <defs>
    <linearGradient id="bg" x1="80" y1="40" x2="432" y2="472" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset="0.55" stop-color="#111827"/>
      <stop offset="1" stop-color="#052e2b"/>
    </linearGradient>
    <linearGradient id="rim" x1="72" y1="64" x2="440" y2="448" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#5eead4"/>
      <stop offset="1" stop-color="#a78bfa"/>
    </linearGradient>
    <radialGradient id="teal" cx="38%" cy="28%" r="70%">
      <stop offset="0" stop-color="#99f6e4"/>
      <stop offset="0.45" stop-color="#14b8a6"/>
      <stop offset="1" stop-color="#0f766e"/>
    </radialGradient>
    <radialGradient id="violet" cx="38%" cy="28%" r="70%">
      <stop offset="0" stop-color="#ddd6fe"/>
      <stop offset="0.45" stop-color="#8b5cf6"/>
      <stop offset="1" stop-color="#5b21b6"/>
    </radialGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="22" flood-color="#000000" flood-opacity="0.35"/>
    </filter>
  </defs>
  <rect width="512" height="512" rx="112" fill="url(#bg)"/>
  <rect x="58" y="58" width="396" height="396" rx="74" fill="none" stroke="url(#rim)" stroke-width="18" opacity="0.95"/>
  <g filter="url(#shadow)">
    <rect x="104" y="108" width="304" height="296" rx="40" fill="#0b1220" stroke="#1f2937" stroke-width="14"/>
    <g fill="#182235">
      <circle cx="151" cy="155" r="27"/>
      <circle cx="203" cy="155" r="27"/>
      <circle cx="255" cy="155" r="27"/>
      <circle cx="307" cy="155" r="27"/>
      <circle cx="359" cy="155" r="27"/>
      <circle cx="151" cy="207" r="27"/>
      <circle cx="203" cy="207" r="27"/>
      <circle cx="255" cy="207" r="27"/>
      <circle cx="307" cy="207" r="27"/>
      <circle cx="359" cy="207" r="27"/>
      <circle cx="151" cy="259" r="27"/>
      <circle cx="203" cy="259" r="27"/>
      <circle cx="255" cy="259" r="27"/>
      <circle cx="307" cy="259" r="27"/>
      <circle cx="359" cy="259" r="27"/>
      <circle cx="151" cy="311" r="27"/>
      <circle cx="203" cy="311" r="27"/>
      <circle cx="255" cy="311" r="27"/>
      <circle cx="307" cy="311" r="27"/>
      <circle cx="359" cy="311" r="27"/>
      <circle cx="151" cy="363" r="27"/>
      <circle cx="203" cy="363" r="27"/>
      <circle cx="255" cy="363" r="27"/>
      <circle cx="307" cy="363" r="27"/>
      <circle cx="359" cy="363" r="27"/>
    </g>
    <circle cx="151" cy="363" r="27" fill="url(#teal)"/>
    <circle cx="203" cy="311" r="27" fill="url(#teal)"/>
    <circle cx="255" cy="259" r="27" fill="url(#teal)"/>
    <circle cx="307" cy="207" r="27" fill="url(#teal)"/>
    <circle cx="203" cy="363" r="27" fill="url(#violet)"/>
    <circle cx="255" cy="363" r="27" fill="url(#violet)"/>
    <circle cx="307" cy="363" r="27" fill="url(#violet)"/>
    <circle cx="359" cy="311" r="27" fill="url(#violet)"/>
  </g>
